name: Refresh Prague DI Dashboard

on:
  workflow_dispatch:        # manual "Run workflow" button
  schedule:
    # Every hour during Prague work hours (Mon-Fri, 04:00-18:00 UTC = 06:00-20:00 Prague summer)
    - cron: "0 4-18 * * 1-5"
    # Once on each weekend day at 06:00 UTC, just to keep MTD fresh
    - cron: "0 6 * * 0,6"

permissions:
  contents: write           # needed to commit refreshed data back

concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build dashboard (queries Databricks via PAT)
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          GH_ACTIONS_URL: https://github.com/${{ github.repository }}/actions/workflows/refresh.yml
        run: python cz_dashboard.py --build --refresh --no-browser

      - name: Commit & push refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto-refresh dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
