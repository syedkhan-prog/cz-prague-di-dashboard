name: Keep Render warm

# Render free tier sleeps services after 15 min of inactivity. This pings the
# /health endpoint every 10 minutes so the dashboard stays warm and refresh
# clicks don't have to wait for a 30-second cold start.

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"     # every 10 minutes

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render
        env:
          RENDER_URL: ${{ vars.RENDER_URL }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "RENDER_URL repo variable is not set yet (set it in Settings -> Secrets and variables -> Actions -> Variables after first Render deploy). Skipping."
            exit 0
          fi
          # 35-second timeout because cold-start can take ~30 sec
          curl -fsSL --max-time 35 "${RENDER_URL%/}/health" && echo " <- pinged at $(date -u)"
